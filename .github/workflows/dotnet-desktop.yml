name: Portable Release

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build-test-package:
    name: Validate and package portable release
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      SOLUTION_PATH: src/TrayToolbar.sln
      PROJECT_PATH: src/TrayToolbar/TrayToolbar.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Restore solution
        working-directory: src
        run: dotnet restore .\TrayToolbar.sln

      - name: Run unit tests
        working-directory: src
        run: dotnet test .\TrayToolbar.sln -c Release --no-restore

      - name: Verify formatting
        working-directory: src
        run: dotnet format .\TrayToolbar.sln --verify-no-changes

      - name: Build solution
        working-directory: src
        run: dotnet build .\TrayToolbar.sln -c Release --no-restore

      - name: Build portable release assets
        shell: pwsh
        run: ./build.ps1

      - name: Resolve release asset names
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content 'src/TrayToolbar/TrayToolbar.csproj'
          $version = $project.Project.PropertyGroup.Version
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'Version not found in src/TrayToolbar/TrayToolbar.csproj'
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "arm64_asset=TrayToolbar-win-arm64-portable-$version.zip" >> $env:GITHUB_OUTPUT
          "x64_asset=TrayToolbar-win-x64-portable-$version.zip" >> $env:GITHUB_OUTPUT

      - name: Upload arm64 portable zip
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.version.outputs.arm64_asset }}
          path: ${{ steps.version.outputs.arm64_asset }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload x64 portable zip
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.version.outputs.x64_asset }}
          path: ${{ steps.version.outputs.x64_asset }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Publish GitHub Release assets
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            ${{ steps.version.outputs.arm64_asset }}
            ${{ steps.version.outputs.x64_asset }}
