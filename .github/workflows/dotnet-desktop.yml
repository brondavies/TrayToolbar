name: Portable Release

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ "master" ]

permissions:
  actions: read
  contents: read

jobs:
  build-test-package:
    name: Validate and package portable release
    runs-on: windows-2025-vs2026
    permissions:
      actions: read
      contents: write

    env:
      SOLUTION_PATH: src/TrayToolbar.sln
      PROJECT_PATH: src/TrayToolbar/TrayToolbar.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Restore solution
        working-directory: src
        run: dotnet restore .\TrayToolbar.sln

      - name: Run unit tests
        working-directory: src
        run: dotnet test .\TrayToolbar.sln -c Release --no-restore

      - name: Verify formatting
        working-directory: src
        run: dotnet format .\TrayToolbar.sln --verify-no-changes

      - name: Build solution
        working-directory: src
        run: dotnet build .\TrayToolbar.sln -c Release --no-restore

      - name: Build portable release assets
        shell: pwsh
        run: ./build.ps1

      - name: Resolve release asset names
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content 'src/TrayToolbar/TrayToolbar.csproj'
          $version = $project.Project.PropertyGroup.Version
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'Version not found in src/TrayToolbar/TrayToolbar.csproj'
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "arm64_asset=TrayToolbar-win-arm64-portable-$version.zip" >> $env:GITHUB_OUTPUT
          "x64_asset=TrayToolbar-win-x64-portable-$version.zip" >> $env:GITHUB_OUTPUT

      - name: Resolve SignPath settings
        id: signpath
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          SIGNPATH_CI_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_CI_SIGNING_POLICY_SLUG }}
          SIGNPATH_RELEASE_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_RELEASE_SIGNING_POLICY_SLUG }}
        run: |
          $isTagBuild = '${{ github.ref_type }}' -eq 'tag'
          $isPullRequest = '${{ github.event_name }}' -eq 'pull_request'

          if ($isPullRequest) {
            Write-Host 'SignPath signing is skipped for pull_request runs to avoid exposing signing credentials to untrusted changes.'
            'enabled=false' >> $env:GITHUB_OUTPUT
            'signing_policy_slug=' >> $env:GITHUB_OUTPUT
            exit 0
          }

          $signingPolicy = if ($isTagBuild -and -not [string]::IsNullOrWhiteSpace($env:SIGNPATH_RELEASE_SIGNING_POLICY_SLUG)) {
            $env:SIGNPATH_RELEASE_SIGNING_POLICY_SLUG
          }
          elseif (-not [string]::IsNullOrWhiteSpace($env:SIGNPATH_CI_SIGNING_POLICY_SLUG)) {
            $env:SIGNPATH_CI_SIGNING_POLICY_SLUG
          }
          elseif (-not [string]::IsNullOrWhiteSpace($env:SIGNPATH_RELEASE_SIGNING_POLICY_SLUG)) {
            $env:SIGNPATH_RELEASE_SIGNING_POLICY_SLUG
          }
          else {
            ''
          }

          $required = @{
            SIGNPATH_API_TOKEN = $env:SIGNPATH_API_TOKEN
            SIGNPATH_ORGANIZATION_ID = $env:SIGNPATH_ORGANIZATION_ID
            SIGNPATH_PROJECT_SLUG = $env:SIGNPATH_PROJECT_SLUG
            SIGNPATH_ARTIFACT_CONFIGURATION_SLUG = $env:SIGNPATH_ARTIFACT_CONFIGURATION_SLUG
            SIGNPATH_SIGNING_POLICY_SLUG = $signingPolicy
          }

          $missing = @(
            $required.GetEnumerator() |
              Where-Object { [string]::IsNullOrWhiteSpace([string]$_.Value) } |
              ForEach-Object Key
          )

          if ($missing.Count -gt 0) {
            if ($isTagBuild) {
              throw "SignPath signing is required for tag builds. Missing configuration: $($missing -join ', ')."
            }

            Write-Warning "SignPath signing is disabled because the following GitHub secrets/variables are missing: $($missing -join ', ')."
            'enabled=false' >> $env:GITHUB_OUTPUT
            'signing_policy_slug=' >> $env:GITHUB_OUTPUT
            exit 0
          }

          'enabled=true' >> $env:GITHUB_OUTPUT
          "signing_policy_slug=$signingPolicy" >> $env:GITHUB_OUTPUT

      - name: Upload arm64 unsigned portable zip for SignPath
        if: steps.signpath.outputs.enabled == 'true'
        id: upload-unsigned-arm64
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.version.outputs.arm64_asset }}
          archive: false
          if-no-files-found: error
          retention-days: 1

      - name: Upload x64 unsigned portable zip for SignPath
        if: steps.signpath.outputs.enabled == 'true'
        id: upload-unsigned-x64
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.version.outputs.x64_asset }}
          archive: false
          if-no-files-found: error
          retention-days: 1

      - name: Sign arm64 portable zip
        if: steps.signpath.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ steps.signpath.outputs.signing_policy_slug }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-arm64.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signpath/arm64
          skip-decompress: true

      - name: Sign x64 portable zip
        if: steps.signpath.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ steps.signpath.outputs.signing_policy_slug }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-x64.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signpath/x64
          skip-decompress: true

      - name: Resolve final asset paths
        id: final-assets
        shell: pwsh
        env:
          SIGNPATH_ENABLED: ${{ steps.signpath.outputs.enabled }}
          ARM64_ASSET: ${{ steps.version.outputs.arm64_asset }}
          X64_ASSET: ${{ steps.version.outputs.x64_asset }}
        run: |
          $arm64RelativePath = if ($env:SIGNPATH_ENABLED -eq 'true') {
            "signpath/arm64/$($env:ARM64_ASSET)"
          }
          else {
            $env:ARM64_ASSET
          }

          $x64RelativePath = if ($env:SIGNPATH_ENABLED -eq 'true') {
            "signpath/x64/$($env:X64_ASSET)"
          }
          else {
            $env:X64_ASSET
          }

          foreach ($relativePath in @($arm64RelativePath, $x64RelativePath)) {
            if (-not (Test-Path (Join-Path $PWD $relativePath))) {
              throw "Expected final asset not found: $relativePath"
            }
          }

          "arm64_path=$arm64RelativePath" >> $env:GITHUB_OUTPUT
          "x64_path=$x64RelativePath" >> $env:GITHUB_OUTPUT

      - name: Upload arm64 portable zip
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.final-assets.outputs.arm64_path }}
          archive: false
          if-no-files-found: error
          retention-days: 14
          overwrite: ${{ steps.signpath.outputs.enabled == 'true' }}

      - name: Upload x64 portable zip
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.final-assets.outputs.x64_path }}
          archive: false
          if-no-files-found: error
          retention-days: 14
          overwrite: ${{ steps.signpath.outputs.enabled == 'true' }}

      - name: Publish GitHub Release assets
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            ${{ steps.final-assets.outputs.arm64_path }}
            ${{ steps.final-assets.outputs.x64_path }}
